<svg xmlns="http://www.w3.org/2000/svg" width="860" height="620" viewBox="0 0 860 620" font-family="-apple-system,BlinkMacSystemFont,'Pretendard','Segoe UI',sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6d28d9"/>
    </marker>
    <marker id="arg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <style>
    .panel{fill:#ffffff;stroke:#e2e0ec;stroke-width:1.5;rx:14;}
    .box{fill:#f6f4fc;stroke:#c9bff0;stroke-width:1.4;}
    .box2{fill:#fff;stroke:#d9d6e8;stroke-width:1.3;}
    .hd{font-size:15px;font-weight:800;fill:#2b2440;}
    .t{font-size:12.5px;font-weight:700;fill:#3b3358;}
    .s{font-size:10.5px;fill:#6b6584;}
    .acc{fill:#6d28d9;}
    .lab{font-size:10px;font-weight:700;fill:#6d28d9;letter-spacing:.06em;}
    .flow{stroke:#6d28d9;stroke-width:2;fill:none;marker-end:url(#ar);}
    .side{stroke:#94a3b8;stroke-width:1.6;fill:none;marker-end:url(#arg);stroke-dasharray:5 4;}
  </style>

  <rect x="1" y="1" width="858" height="618" rx="18" fill="#fbfaff" stroke="#e6e2f5" stroke-width="1.5"/>
  <text x="28" y="38" class="hd">Eval Studio — 단일 HTML 앱 전체 아키텍처 (실측 경로)</text>
  <text x="28" y="56" class="s">브라우저 안에서 생성 → 판정 → 집계·은퇴 → 결과·발행이 전부 돈다. 3,400줄 index.html 하나.</text>

  <!-- ①~③ main flow -->
  <rect x="28" y="78" width="180" height="112" rx="12" class="box"/>
  <text x="44" y="102" class="lab">① 설정</text>
  <text x="44" y="122" class="t">모델 N · 심판 jury</text>
  <text x="44" y="139" class="s">권수 · 예산 상한($)</text>
  <text x="44" y="154" class="s">스케줄 full / retire2</text>
  <text x="44" y="169" class="s">사전 점검: slug 유효성</text>

  <rect x="238" y="78" width="180" height="112" rx="12" class="box"/>
  <text x="254" y="102" class="lab">생성 (프롬프트 × 생존자)</text>
  <text x="254" y="122" class="t">orCall · temp 0.7</text>
  <text x="254" y="139" class="s">OpenRouter / Ollama(로컬)</text>
  <text x="254" y="154" class="s">출력 정제 → 한국어 번역</text>
  <text x="254" y="169" class="s">모델별 토큰·비용 누적</text>

  <rect x="448" y="78" width="196" height="112" rx="12" class="box"/>
  <text x="464" y="102" class="lab">판정 (쌍 × 심판, 자기계열 제외)</text>
  <text x="464" y="122" class="t">temp 0 · 양방향 swap</text>
  <text x="464" y="139" class="s">judge(A,B) + judge(B,A)</text>
  <text x="464" y="154" class="s">parseWin → 평균 score 0/½/1</text>
  <text x="464" y="169" class="s">parse_ok 집계(침묵 tie 감시)</text>

  <rect x="674" y="78" width="158" height="112" rx="12" class="box"/>
  <text x="690" y="102" class="lab">③ 결과</text>
  <text x="690" y="122" class="t">Arena(BT) + 95% CI</text>
  <text x="690" y="139" class="s">Elo(보조·진단)</text>
  <text x="690" y="154" class="s">축 진단 · 자기편향 카드</text>
  <text x="690" y="169" class="s">난이도 β(반응성)</text>

  <path class="flow" d="M208 134 L236 134"/>
  <path class="flow" d="M418 134 L446 134"/>
  <path class="flow" d="M644 134 L672 134"/>

  <!-- retire loop band -->
  <rect x="238" y="216" width="406" height="96" rx="12" class="box2"/>
  <text x="254" y="240" class="lab">배치 경계 (retire2 스케줄)</text>
  <text x="254" y="260" class="t">BT(MM) + 쌍 클러스터 부트스트랩 CI (1000회)</text>
  <text x="254" y="278" class="s">CI 분리 2연속 → 은퇴(리더보드엔 은퇴 시점 점수로 잔류)</text>
  <text x="254" y="293" class="s">옵션: 부활전(wildcard) · ⚡능동 표집(갈린 쌍 판정 생략)</text>
  <path class="flow" d="M546 192 L546 214"/>
  <path class="flow" d="M330 216 C330 200 300 200 300 192"/>
  <text x="340" y="206" class="s">생존자만 다음 배치</text>

  <!-- bottom bands -->
  <rect x="28" y="342" width="402" height="120" rx="12" class="box2"/>
  <text x="44" y="366" class="lab">저장 계층 — 유실 0 설계</text>
  <text x="44" y="386" class="t">localStorage (1.5초 자동)</text>
  <text x="230" y="386" class="s">≈10MB 한도</text>
  <path class="side" d="M44 396 L44 410"/>
  <text x="44" y="424" class="t">IndexedDB (초과 시 즉시 폴백 · 10쌍마다 백업)</text>
  <text x="44" y="444" class="t">GitHub (세션·투표 커밋 — 다기기 이어하기)</text>

  <rect x="458" y="342" width="374" height="120" rx="12" class="box2"/>
  <text x="474" y="366" class="lab">사람 골든셋 (② 평가 화면)</text>
  <text x="474" y="386" class="t">층화 표본 n쌍 (모델×주제×단어수)</text>
  <text x="474" y="404" class="s">평가자별 투표(raters) · pair_id 매칭</text>
  <text x="474" y="424" class="t">↔ 심판 일치도: Cohen κ · Krippendorff α</text>
  <text x="474" y="444" class="s">golden_labels.jsonl 내보내기</text>

  <path class="side" d="M330 312 L200 340"/>
  <path class="side" d="M560 190 L610 340"/>

  <!-- python mirror -->
  <rect x="28" y="492" width="804" height="100" rx="12" fill="#f3f1fa" stroke="#d9d2ef" stroke-width="1.4"/>
  <text x="44" y="516" class="lab">PYTHON 파이프라인 (오프라인 미러 · 의존성 0)</text>
  <text x="44" y="538" class="t">generate → judge(temp 0) → aggregate(BT·부트스트랩·Elo) → validate(κ·α·PPI) → report</text>
  <text x="44" y="558" class="s">같은 수식을 두 언어로 유지 — 등가성 테스트로 같은 입력에 같은 순위 검증 · mock 모드로 키 없이 결정론 재현</text>
  <text x="44" y="576" class="s">v1.1: 동점-인식 BT(Davidson) · PPI · 능동 표집 분석</text>
  <path class="side" d="M430 462 L430 490"/>

  <!-- publish -->
  <text x="700" y="212" class="s">발행: report.html · results.json</text>
  <text x="700" y="227" class="s">→ GitHub 아카이브</text>
  <path class="side" d="M753 190 L753 200"/>
</svg>
