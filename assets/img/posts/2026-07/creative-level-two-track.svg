<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="850" viewBox="0 0 1200 850" role="img" aria-labelledby="title desc">
  <title id="title">아동 영어동화 창작 순위와 독립 난이도 프로브</title>
  <desc id="desc">왼쪽 창작 본선은 주제, 형식, 길이, 독서 방식, 연령만으로 텍스트 동화를 생성하고 안전과 요청 준수, 형식별 완성도를 페어와이즈로 비교해 전체 Winner만 Bradley-Terry 순위에 사용한다. 오른쪽 선택형 난이도 프로브만 목표 Lexile을 넣어 세 단계 글을 추가 생성하고 내부 가독성 지표와 반응성 베타를 계산한다. 오른쪽 수치는 창작 순위와 은퇴에 들어가지 않는다.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaff"/>
      <stop offset="1" stop-color="#f5f7ff"/>
    </linearGradient>
    <linearGradient id="rank" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#312e81" flood-opacity=".10"/>
    </filter>
    <marker id="purpleArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#6d28d9"/>
    </marker>
    <marker id="amberArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#b45309"/>
    </marker>
  </defs>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif}
    .title{font-size:27px;font-weight:850;fill:#231942;letter-spacing:-.02em}
    .subtitle{font-size:14px;fill:#6b6584}
    .kicker{font-size:11px;font-weight:800;letter-spacing:.10em}
    .head{font-size:18px;font-weight:800;fill:#292342}
    .body{font-size:13px;font-weight:650;fill:#4c4664}
    .small{font-size:11.5px;fill:#6b6584}
    .white{fill:#fff}
    .box{fill:#fff;stroke:#ddd8ec;stroke-width:1.4}
    .rankPanel{fill:#faf7ff;stroke:#c4b5fd;stroke-width:1.5}
    .probePanel{fill:#fffbeb;stroke:#f2ca7d;stroke-width:1.5}
    .rankLine{fill:none;stroke:#6d28d9;stroke-width:2.2;marker-end:url(#purpleArrow)}
    .probeLine{fill:none;stroke:#b45309;stroke-width:2.2;marker-end:url(#amberArrow)}
    .noJoin{fill:none;stroke:#b7b2c7;stroke-width:1.6;stroke-dasharray:6 6}
  </style>

  <rect x="1" y="1" width="1198" height="848" rx="24" fill="url(#bg)" stroke="#e4e0ef" stroke-width="2"/>
  <text x="48" y="50" class="title">창작 품질과 수치 난이도 제어는 서로 다른 질문이다</text>
  <text x="48" y="76" class="subtitle">childlit-v3 본선은 Lexile을 보지 않는다 · independent-reader-probe-v2만 목표 수치를 받으며 기본 OFF</text>

  <rect x="48" y="99" width="155" height="25" rx="12" fill="#ede9fe"/><text x="126" y="116" text-anchor="middle" class="small" fill="#5b21b6">생성 childlit-v3</text>
  <rect x="214" y="99" width="185" height="25" rx="12" fill="#ede9fe"/><text x="306" y="116" text-anchor="middle" class="small" fill="#5b21b6">심판 childlit-strict-v3</text>
  <rect x="783" y="99" width="248" height="25" rx="12" fill="#fef3c7"/><text x="907" y="116" text-anchor="middle" class="small" fill="#92400e">난이도 independent-reader-probe-v2</text>

  <!-- Creative track -->
  <rect x="48" y="145" width="682" height="615" rx="20" class="rankPanel"/>
  <text x="78" y="180" class="kicker" fill="#6d28d9">A · 창작 본선 · 순위 경로</text>
  <text x="78" y="209" class="head">목표 아동 독자에게 더 나은 텍스트는 어느 쪽인가</text>

  <g filter="url(#shadow)">
    <rect x="120" y="238" width="535" height="82" rx="16" fill="url(#rank)"/>
    <text x="388" y="264" text-anchor="middle" class="kicker white">앱이 조합한 본선 user 요청</text>
    <text x="388" y="290" text-anchor="middle" font-size="16" font-weight="800" class="white">주제 · 형식 · 단어 수 · 독서 방식 · 목표 연령</text>
    <text x="388" y="309" text-anchor="middle" font-size="11.5" fill="#e9e7ff">수치 Lexile 없음 · system/user 역할과 정책 버전 저장</text>
  </g>
  <path d="M388 320V347" class="rankLine"/>
  <rect x="162" y="348" width="452" height="67" rx="13" class="box"/>
  <text x="388" y="374" text-anchor="middle" class="body">후보 모델별 영어 동화 1편 · 텍스트만 출력</text>
  <text x="388" y="396" text-anchor="middle" class="small">이미지·그림 지시·페이지 메모 금지 · 출력 토큰 상한</text>
  <path d="M388 415V442" class="rankLine"/>
  <rect x="102" y="443" width="572" height="77" rx="13" class="box"/>
  <text x="388" y="469" text-anchor="middle" class="body">결정론적 계약 검사</text>
  <text x="388" y="491" text-anchor="middle" class="small">실제 단어 수 측정 · 비본문 출력 탐지 · 기술적 실패는 invalid</text>
  <text x="388" y="508" text-anchor="middle" class="small">유효한 본문만 다음 단계 · 한국어 번역은 표시 전용</text>
  <path d="M388 520V547" class="rankLine"/>
  <rect x="102" y="548" width="572" height="91" rx="13" class="box"/>
  <text x="388" y="575" text-anchor="middle" class="body">익명 Story A/B · 다계열 LLM jury · 정방향 + 역방향</text>
  <text x="388" y="597" text-anchor="middle" class="small">안전 하드 게이트 → 요청·방식·연령 → 형식별 완성도 → 나머지 문학성</text>
  <text x="388" y="616" text-anchor="middle" class="small">10개 축은 진단 · 가중합 없음 · 엄격 파싱 실패는 tie가 아닌 invalid</text>
  <path d="M388 639V666" class="rankLine"/>
  <rect x="102" y="667" width="572" height="62" rx="13" fill="#6d28d9"/>
  <text x="388" y="694" text-anchor="middle" font-size="15" font-weight="800" class="white">유효한 전체 WINNER만 → Bradley–Terry 창작 순위</text>
  <text x="388" y="714" text-anchor="middle" font-size="11.5" fill="#ede9fe">CI·retire2·DPO 승자도 이 경로의 유효 판정만 사용</text>

  <!-- Probe track -->
  <rect x="758" y="145" width="394" height="615" rx="20" class="probePanel"/>
  <text x="788" y="180" class="kicker" fill="#b45309">B · 선택형 난이도 프로브 · 비순위 경로</text>
  <text x="788" y="209" class="head">요청 수치가 바뀌면 글도 움직이는가</text>

  <polygon points="955,241 1039,283 955,325 871,283" fill="#fff" stroke="#e5ad48" stroke-width="1.5"/>
  <text x="955" y="279" text-anchor="middle" class="body">levelTrackOn?</text>
  <text x="955" y="298" text-anchor="middle" class="small">기본 OFF</text>
  <path d="M955 325V353" class="probeLine"/>
  <rect x="801" y="354" width="308" height="80" rx="13" class="box"/>
  <text x="955" y="378" text-anchor="middle" class="body">같은 과제 + 독립 읽기 + 연령</text>
  <text x="955" y="400" text-anchor="middle" class="body" fill="#92400e">목표 Lexile만 −1 · 기준 · +1로 변경</text>
  <text x="955" y="420" text-anchor="middle" class="small">생존 모델당 probe 3편 · 심판·번역 없음</text>
  <path d="M955 434V462" class="probeLine"/>
  <rect x="801" y="463" width="308" height="92" rx="13" class="box"/>
  <text x="955" y="490" text-anchor="middle" class="body">FKGL + Coleman–Liau + ARI</text>
  <text x="955" y="512" text-anchor="middle" class="small">단순 평균 학년 → 내부 Lexile proxy</text>
  <text x="955" y="532" text-anchor="middle" class="small">공인 Lexile·실아동 학년 배치가 아님</text>
  <path d="M955 555V583" class="probeLine"/>
  <rect x="801" y="584" width="308" height="82" rx="13" class="box"/>
  <text x="955" y="611" text-anchor="middle" class="body">방향성·Match Rate·MAE·반응성 β</text>
  <text x="955" y="633" text-anchor="middle" class="small">탐색용 진단 · 짧은 텍스트와 기준점 미보정</text>
  <text x="955" y="651" text-anchor="middle" class="small">사람·출판 코퍼스 교정 전 승격 금지</text>
  <rect x="801" y="688" width="308" height="41" rx="11" fill="#b45309"/>
  <text x="955" y="714" text-anchor="middle" font-size="14" font-weight="800" class="white">BT · CI · 은퇴 · DPO에 영향 없음</text>

  <path d="M730 453H758" class="noJoin"/>
  <path d="M744 442V464M733 442V464" stroke="#8d879e" stroke-width="2"/>
  <text x="744" y="484" text-anchor="middle" class="small">분리</text>

  <rect x="48" y="789" width="1104" height="35" rx="12" fill="#fff" stroke="#ddd8ec"/>
  <text x="600" y="811" text-anchor="middle" class="small">결과 화면: 생성 system/user · 난이도 system/user · 심판 system · 정/역방향 user · 모델/주제/길이/독서 방식/프로브 목표 필터</text>
</svg>
