<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">동화 평가의 통합 생성과 창작·난이도 2트랙 아키텍처</title>
  <desc id="desc">주제, 형식, 길이, 연령, 목표 Lexile을 합친 요청으로 모델마다 본선 동화 한 편을 만든다. 같은 동화는 왼쪽의 LLM 페어와이즈 심판과 Bradley-Terry 창작 순위, 가운데의 자동 가독성 진단으로 나뉜다. 선택형 levelTrack은 켰을 때만 마이너스 1, 기준, 플러스 1 학년 동화를 추가 생성해 반응성 베타를 계산하며 창작 순위에는 들어가지 않는다.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaff"/>
      <stop offset="1" stop-color="#f5f7ff"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#312e81" flood-opacity=".10"/>
    </filter>
    <marker id="purpleArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#6d28d9"/>
    </marker>
    <marker id="tealArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#0f766e"/>
    </marker>
    <marker id="amberArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#b45309"/>
    </marker>
  </defs>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif}
    .title{font-size:27px;font-weight:850;fill:#231942;letter-spacing:-.02em}
    .subtitle{font-size:14px;fill:#6b6584}
    .kicker{font-size:11px;font-weight:800;letter-spacing:.10em}
    .head{font-size:18px;font-weight:800;fill:#292342}
    .body{font-size:13px;font-weight:600;fill:#4c4664}
    .small{font-size:11.5px;fill:#6b6584}
    .white{fill:#fff}
    .box{fill:#fff;stroke:#ddd8ec;stroke-width:1.4}
    .rankBox{fill:#faf7ff;stroke:#c4b5fd;stroke-width:1.5}
    .measureBox{fill:#f2fbf9;stroke:#99d8d0;stroke-width:1.5}
    .probeBox{fill:#fffbeb;stroke:#f2ca7d;stroke-width:1.5}
    .rankLine{fill:none;stroke:#6d28d9;stroke-width:2.2;marker-end:url(#purpleArrow)}
    .measureLine{fill:none;stroke:#0f766e;stroke-width:2.2;marker-end:url(#tealArrow)}
    .probeLine{fill:none;stroke:#b45309;stroke-width:2.2;marker-end:url(#amberArrow)}
    .probeDash{fill:none;stroke:#b45309;stroke-width:1.8;stroke-dasharray:6 5;marker-end:url(#amberArrow)}
    .mutedLine{fill:none;stroke:#b7b2c7;stroke-width:1.5;stroke-dasharray:5 5}
  </style>

  <rect x="1" y="1" width="1198" height="818" rx="24" fill="url(#bg)" stroke="#e4e0ef" stroke-width="2"/>
  <text x="48" y="51" class="title">본선 동화는 한 편, 평가는 두 갈래</text>
  <text x="48" y="76" class="subtitle">통합 생성 요청 → target-conditioned 창작 순위 + 자동 가독성 진단 · 선택형 반응성 프로브는 완전히 별도</text>

  <g filter="url(#shadow)">
    <rect x="310" y="105" width="580" height="96" rx="18" fill="url(#hero)"/>
    <text x="600" y="133" text-anchor="middle" class="kicker white">통합 본선 생성 요청 · 모델당 1편</text>
    <text x="600" y="160" text-anchor="middle" font-size="17" font-weight="800" class="white">주제 · 형식 · 길이 · 목표 연령 · 목표 Lexile</text>
    <text x="600" y="183" text-anchor="middle" font-size="12" fill="#e9e7ff">하나의 user prompt에 모두 포함 · 출력 토큰 상한 적용</text>
  </g>
  <path d="M600 201V231" class="rankLine"/>
  <rect x="415" y="232" width="370" height="74" rx="15" class="box" filter="url(#shadow)"/>
  <text x="600" y="260" text-anchor="middle" class="head">모델별 본선 영어 동화 1편</text>
  <text x="600" y="285" text-anchor="middle" class="small">같은 원문을 아래 두 경로에서 재사용 · 한국어 번역은 표시 전용</text>

  <circle cx="600" cy="342" r="7" fill="#6d28d9"/>
  <path d="M600 306V342H260V377" class="rankLine"/>
  <path d="M600 306V342H600V377" class="measureLine"/>
  <path d="M890 153H1032V376" class="probeDash"/>

  <!-- ranking path -->
  <rect x="55" y="378" width="410" height="330" rx="19" class="rankBox"/>
  <text x="82" y="410" class="kicker" fill="#6d28d9">A · 본선 순위 경로</text>
  <text x="82" y="438" class="head">목표 독자 조건부 창작 품질</text>
  <rect x="82" y="461" width="356" height="65" rx="12" class="box"/>
  <text x="260" y="485" text-anchor="middle" class="body">동일 프롬프트의 모델 동화 A/B 비교</text>
  <text x="260" y="507" text-anchor="middle" class="small">모델명 비공개 · 동일 본문 상한</text>
  <path d="M260 526V548" class="rankLine"/>
  <rect x="82" y="549" width="356" height="77" rx="12" class="box"/>
  <text x="260" y="575" text-anchor="middle" class="body">다계열 LLM jury · 정방향 + 역방향</text>
  <text x="260" y="597" text-anchor="middle" class="small">요청·연령·Lexile·실측 단어 수를 맥락으로 제공</text>
  <text x="260" y="614" text-anchor="middle" class="small">엄격 파싱 실패는 invalid 제외 · 기본 재호출 없음</text>
  <path d="M260 626V648" class="rankLine"/>
  <rect x="82" y="649" width="356" height="42" rx="11" fill="#6d28d9"/>
  <text x="260" y="675" text-anchor="middle" font-size="14" font-weight="800" class="white">전체 WINNER만 → Bradley–Terry 순위</text>

  <!-- deterministic diagnostic path -->
  <rect x="490" y="378" width="405" height="330" rx="19" class="measureBox"/>
  <text x="517" y="410" class="kicker" fill="#0f766e">B · 같은 본문 자동 진단</text>
  <text x="517" y="438" class="head">결정론적 가독성·길이 측정</text>
  <rect x="517" y="461" width="351" height="65" rx="12" class="box"/>
  <text x="692" y="485" text-anchor="middle" class="body">FKGL + Coleman–Liau + ARI 평균</text>
  <text x="692" y="507" text-anchor="middle" class="small">문장·단어·음절·글자 수 기반 표면 프록시</text>
  <path d="M692 526V548" class="measureLine"/>
  <rect x="517" y="549" width="351" height="77" rx="12" class="box"/>
  <text x="692" y="575" text-anchor="middle" class="body">측정 학년 → 비공인 Lexile 근사</text>
  <text x="692" y="597" text-anchor="middle" class="small">Match Rate · MAE · 일관성 · 단어 수 준수</text>
  <text x="692" y="614" text-anchor="middle" class="small">짧은 글 오차가 커서 참고 진단으로만 사용</text>
  <path d="M692 626V648" class="measureLine"/>
  <rect x="517" y="649" width="351" height="42" rx="11" fill="#0f766e"/>
  <text x="692" y="675" text-anchor="middle" font-size="14" font-weight="800" class="white">진단 카드만 → BT·은퇴에 수치 미사용</text>

  <!-- optional probe -->
  <rect x="920" y="378" width="225" height="330" rx="19" class="probeBox"/>
  <text x="945" y="410" class="kicker" fill="#b45309">선택 기능</text>
  <text x="945" y="438" class="head">levelTrackOn?</text>
  <path d="M1032 454V476" class="probeLine"/>
  <polygon points="1032,477 1110,520 1032,563 954,520" fill="#fff" stroke="#e5ad48" stroke-width="1.5"/>
  <text x="1032" y="516" text-anchor="middle" class="body">ON / OFF</text>
  <text x="1032" y="535" text-anchor="middle" class="small">프로브 실행?</text>
  <path d="M984 558C964 570 958 577 958 585" class="mutedLine"/>
  <rect x="936" y="585" width="82" height="43" rx="9" fill="#fff" stroke="#d8d3c8"/>
  <text x="977" y="602" text-anchor="middle" class="small" fill="#7c6f62">OFF</text>
  <text x="977" y="619" text-anchor="middle" class="body">추가 0</text>
  <path d="M1080 558C1101 570 1107 577 1107 585" class="probeLine"/>
  <rect x="1028" y="585" width="100" height="43" rx="9" fill="#fff" stroke="#e5ad48"/>
  <text x="1078" y="602" text-anchor="middle" class="small" fill="#b45309">ON</text>
  <text x="1078" y="619" text-anchor="middle" class="body">3편 / probe</text>
  <text x="1032" y="651" text-anchor="middle" class="body" fill="#92400e">−1 · 기준 · +1학년</text>
  <text x="1032" y="674" text-anchor="middle" class="body" fill="#92400e">반응성 β 계산</text>
  <text x="1032" y="696" text-anchor="middle" class="small">심판·번역 없음 · BT 영향 없음</text>

  <path d="M465 724H895" stroke="#c8c2d8" stroke-width="1.5" stroke-dasharray="6 6"/>
  <text x="680" y="746" text-anchor="middle" class="small">경로 B와 levelTrack의 숫자는 경로 A로 합류하지 않는다</text>
  <rect x="55" y="766" width="12" height="12" rx="3" fill="#6d28d9"/><text x="76" y="777" class="small">순위 신호</text>
  <rect x="160" y="766" width="12" height="12" rx="3" fill="#0f766e"/><text x="181" y="777" class="small">자동 진단</text>
  <rect x="271" y="766" width="12" height="12" rx="3" fill="#b45309"/><text x="292" y="777" class="small">옵션 프로브</text>
  <text x="1145" y="777" text-anchor="end" class="small">little-bard Eval Studio · aligned-v2 / strict-v2</text>
</svg>
