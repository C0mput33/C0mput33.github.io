<svg xmlns="http://www.w3.org/2000/svg" width="960" height="940" viewBox="0 0 960 940" font-family="-apple-system,BlinkMacSystemFont,'Pretendard','Segoe UI',sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6d28d9"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#312e81" flood-opacity=".08"/>
    </filter>
  </defs>
  <style>
    .panel{fill:#fff;stroke:#e2e0ec;stroke-width:1.5}
    .box{fill:#f7f5ff;stroke:#c9bff0;stroke-width:1.4;filter:url(#shadow)}
    .neutral{fill:#fff;stroke:#d9d6e8;stroke-width:1.3}
    .warn{fill:#fff8f2;stroke:#e6ad81;stroke-width:1.4}
    .gate{fill:#f0fdf4;stroke:#86c99a;stroke-width:1.4;filter:url(#shadow)}
    .title{font-size:18px;font-weight:800;fill:#27213b}
    .subtitle{font-size:11px;fill:#6b6584}
    .panelTitle{font-size:13px;font-weight:800;fill:#6d28d9;letter-spacing:.02em}
    .head{font-size:12px;font-weight:800;fill:#342d4d}
    .text{font-size:10.5px;fill:#5f5875}
    .small{font-size:9.5px;fill:#746d88}
    .note{font-size:10px;font-weight:700;fill:#6d28d9}
    .bad{font-size:10px;font-weight:700;fill:#b45309}
    .good{font-size:10px;font-weight:700;fill:#15803d}
    .flow{stroke:#6d28d9;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .side{stroke:#94a3b8;stroke-width:1.6;fill:none;marker-end:url(#arrowGray);stroke-dasharray:5 4}
  </style>

  <rect x="1" y="1" width="958" height="938" rx="18" fill="#fbfaff" stroke="#e6e2f5" stroke-width="1.5"/>
  <text x="30" y="38" class="title">Qwen3.6-35B-A3B 투입 경로 — 런타임과 학습·이식성 게이트</text>
  <text x="30" y="57" class="subtitle">사용자 요청은 비동기 워커로 처리하고, 로컬 장기 학습은 MLX → PEFT → vLLM 동등성 검사를 통과한 뒤에만 시작한다.</text>

  <!-- A: runtime -->
  <rect x="20" y="74" width="920" height="252" rx="14" class="panel"/>
  <text x="38" y="98" class="panelTitle">A. 사용자 요청 경로 — 모델과 분리해 항상 유지</text>

  <rect x="38" y="116" width="100" height="62" rx="10" class="neutral"/>
  <text x="88" y="142" text-anchor="middle" class="head">모바일 앱</text>
  <text x="88" y="158" text-anchor="middle" class="text">요청 · 상태 조회</text>

  <rect x="164" y="116" width="108" height="62" rx="10" class="neutral"/>
  <text x="218" y="142" text-anchor="middle" class="head">게이트웨이</text>
  <text x="218" y="158" text-anchor="middle" class="text">인증 · 요청 추적</text>

  <rect x="298" y="108" width="150" height="78" rx="10" class="box"/>
  <text x="373" y="132" text-anchor="middle" class="head">API 서버</text>
  <text x="373" y="149" text-anchor="middle" class="text">멱등 검사 · job 발행</text>
  <text x="373" y="165" text-anchor="middle" class="text">202 + job_id 반환</text>

  <rect x="474" y="108" width="138" height="78" rx="10" class="box"/>
  <text x="543" y="132" text-anchor="middle" class="head">Redis</text>
  <text x="543" y="149" text-anchor="middle" class="text">작업 큐 · ACK/DLQ</text>
  <text x="543" y="165" text-anchor="middle" class="text">진행률 키 · TTL</text>

  <rect x="638" y="96" width="282" height="102" rx="10" class="box"/>
  <text x="779" y="120" text-anchor="middle" class="head">텍스트 생성 워커</text>
  <text x="779" y="138" text-anchor="middle" class="text">생성 Port → Bedrock 또는 자체 GPU Adapter</text>
  <text x="779" y="154" text-anchor="middle" class="text">안전성·읽기 난이도 검증 · 미달 시 재생성</text>
  <text x="779" y="170" text-anchor="middle" class="text">완료·실패 보고 · 재시도 · DLQ 격리</text>
  <text x="779" y="187" text-anchor="middle" class="note">모델 교체 지점은 이 Adapter 한 곳</text>

  <rect x="298" y="234" width="150" height="54" rx="10" class="neutral"/>
  <text x="373" y="257" text-anchor="middle" class="head">PostgreSQL</text>
  <text x="373" y="274" text-anchor="middle" class="text">상태 · 동화 저장</text>

  <rect x="474" y="234" width="138" height="54" rx="10" class="neutral"/>
  <text x="543" y="257" text-anchor="middle" class="head">삽화 워커 → S3</text>
  <text x="543" y="274" text-anchor="middle" class="text">텍스트 확정 후 별도 job</text>

  <rect x="164" y="234" width="108" height="54" rx="10" class="neutral"/>
  <text x="218" y="257" text-anchor="middle" class="head">푸시 알림</text>
  <text x="218" y="274" text-anchor="middle" class="text">완료 · 실패 통지</text>

  <path class="flow" d="M138 147 L160 147"/>
  <path class="flow" d="M272 147 L294 147"/>
  <path class="flow" d="M448 147 L470 147"/>
  <path class="flow" d="M612 147 L634 147"/>
  <path class="flow" d="M638 198 C560 216 470 214 448 186"/>
  <path class="flow" d="M373 186 L373 230"/>
  <path class="flow" d="M448 261 L470 261"/>
  <path class="flow" d="M298 261 L276 261"/>
  <path class="side" d="M218 234 C218 206 150 195 112 178"/>
  <text x="650" y="220" class="small">성공·실패 결과를 API 서버에 보고</text>
  <text x="38" y="308" class="small">긴 생성 작업을 HTTP 연결에 묶지 않는다. 앱은 job_id로 진행률을 조회하고, 워커만 독립적으로 늘린다.</text>

  <!-- B: target model -->
  <rect x="20" y="342" width="920" height="168" rx="14" class="panel"/>
  <text x="38" y="366" class="panelTitle">B. 모델 계층 — 이름과 지원 범위를 먼저 고정</text>

  <rect x="38" y="384" width="258" height="100" rx="10" class="neutral"/>
  <text x="167" y="407" text-anchor="middle" class="head">Bedrock 기성 모델</text>
  <text x="167" y="426" text-anchor="middle" class="text">지금의 품질·비용 기준선</text>
  <text x="167" y="442" text-anchor="middle" class="text">Converse API Adapter</text>
  <text x="167" y="462" text-anchor="middle" class="good">평가가 끝날 때까지 기본 경로 유지</text>

  <rect x="320" y="384" width="292" height="100" rx="10" class="warn"/>
  <text x="466" y="407" text-anchor="middle" class="head">Qwen3.6-35B-A3B — 정확한 후보</text>
  <text x="466" y="426" text-anchor="middle" class="text">35B total · 3B active · MLX 4bit 19.0GiB</text>
  <text x="466" y="442" text-anchor="middle" class="text">qwen3_5_moe · 기본 컨텍스트 262K</text>
  <text x="466" y="462" text-anchor="middle" class="bad">Bedrock CMI 미지원 → GPU vLLM 경로</text>

  <rect x="636" y="384" width="286" height="100" rx="10" class="box"/>
  <text x="779" y="407" text-anchor="middle" class="head">AWS 첫 서빙 후보</text>
  <text x="779" y="426" text-anchor="middle" class="text">EC2 G6e 48GB($2.288/h) → G7e 96GB</text>
  <text x="779" y="442" text-anchor="middle" class="text">공식 FP8 · vLLM · text-only · 8K부터</text>
  <text x="779" y="462" text-anchor="middle" class="text">비동기 job API · 지연/메모리/비용 실측</text>

  <path class="flow" d="M296 434 L316 434"/>
  <path class="flow" d="M612 434 L632 434"/>
  <text x="38" y="497" class="small">Qwen3-30B-A3B(qwen3_moe)는 다른 모델이다. CMI 지원 여부와 체크포인트 변환은 별도로 검증한다.</text>

  <!-- C: offline gates -->
  <rect x="20" y="526" width="920" height="376" rx="14" class="panel"/>
  <text x="38" y="550" class="panelTitle">C. 오프라인 경로 — 장기 학습보다 먼저 실패를 싸게 찾는다</text>

  <rect x="38" y="572" width="200" height="150" rx="10" class="box"/>
  <text x="138" y="596" text-anchor="middle" class="head">① 데이터·로컬 스모크</text>
  <text x="138" y="617" text-anchor="middle" class="text">childlit-v3 / childlit-strict-v3만 사용</text>
  <text x="138" y="634" text-anchor="middle" class="text">M5 Pro 48GB · MLX 4bit</text>
  <text x="138" y="651" text-anchor="middle" class="text">LoRA · batch 1 · seq 512</text>
  <text x="138" y="668" text-anchor="middle" class="text">4 layers · rank 8 · 10~20 steps</text>
  <text x="138" y="685" text-anchor="middle" class="text">peak memory · step time 기록</text>
  <text x="138" y="704" text-anchor="middle" class="bad">전체 학습·DPO부터 시작하지 않음</text>

  <rect x="264" y="572" width="206" height="150" rx="10" class="gate"/>
  <text x="367" y="596" text-anchor="middle" class="head">② 이식성 게이트</text>
  <text x="367" y="617" text-anchor="middle" class="text">MLX 저장·재로드</text>
  <text x="367" y="634" text-anchor="middle" class="text">Adapter → PEFT 텐서 매핑</text>
  <text x="367" y="651" text-anchor="middle" class="text">CUDA vLLM 로드</text>
  <text x="367" y="668" text-anchor="middle" class="text">고정 프롬프트 20개 동등성 검사</text>
  <text x="367" y="687" text-anchor="middle" class="good">통과 → 학습 범위 확대</text>
  <text x="367" y="704" text-anchor="middle" class="bad">실패 → CUDA PEFT로 재학습</text>

  <rect x="496" y="572" width="194" height="150" rx="10" class="box"/>
  <text x="593" y="596" text-anchor="middle" class="head">③ AWS 단일 GPU 스모크</text>
  <text x="593" y="617" text-anchor="middle" class="text">G6e · L40S 48GB · 공식 FP8</text>
  <text x="593" y="634" text-anchor="middle" class="text">vLLM · language-model-only · MTP off</text>
  <text x="593" y="651" text-anchor="middle" class="text">8K → 16K 문맥 단계 확대</text>
  <text x="593" y="668" text-anchor="middle" class="text">TTFT · tok/s · GPU memory</text>
  <text x="593" y="685" text-anchor="middle" class="text">실패율 · 권당 비용 측정</text>
  <text x="593" y="704" text-anchor="middle" class="note">이후 Async/scale-to-zero 판단</text>

  <rect x="716" y="572" width="206" height="150" rx="10" class="gate"/>
  <text x="819" y="596" text-anchor="middle" class="head">④ 평가·교체 게이트</text>
  <text x="819" y="617" text-anchor="middle" class="text">childlit-strict-v3 유효 판정만 사용</text>
  <text x="819" y="634" text-anchor="middle" class="text">창작 순위 / 난이도 진단 분리</text>
  <text x="819" y="651" text-anchor="middle" class="text">튜닝 전후 같은 조건 비교</text>
  <text x="819" y="668" text-anchor="middle" class="text">품질 · 비용 · 지연 · 실패율</text>
  <text x="819" y="687" text-anchor="middle" class="good">통과 → Adapter 설정 전환</text>
  <text x="819" y="704" text-anchor="middle" class="bad">미달 → 기존 모델 유지</text>

  <path class="flow" d="M238 647 L260 647"/>
  <path class="flow" d="M470 647 L492 647"/>
  <path class="flow" d="M690 647 L712 647"/>
  <path class="side" d="M819 572 C819 538 842 517 842 484"/>
  <text x="720" y="538" class="note">통과한 모델만 B의 Adapter에 연결</text>

  <rect x="38" y="752" width="884" height="118" rx="10" class="neutral"/>
  <text x="58" y="777" class="head">중단 조건</text>
  <text x="58" y="799" class="text">• 512 tokens · batch 1 · 4 layers에서도 OOM 또는 비정상 loss</text>
  <text x="58" y="819" class="text">• MLX Adapter를 PEFT/vLLM에서 재현하지 못함</text>
  <text x="58" y="839" class="text">• 48GB GPU 한 장에서 목표 지연·동시성을 충족하지 못함</text>
  <text x="500" y="799" class="text">• step 시간이 프로젝트 일정에 맞지 않음</text>
  <text x="500" y="819" class="text">• 더 작은 9B·14B 후보가 허용 품질과 낮은 비용을 충족</text>
  <text x="500" y="839" class="text">→ Qwen3-30B-A3B 또는 더 작은 모델로 전환</text>

  <text x="30" y="923" class="subtitle">핵심: 48GB 맥북은 탐색·LoRA 스모크 장비다. 장기 학습의 허가는 메모리 여유가 아니라 AWS 재현 가능성이 결정한다.</text>
</svg>
