<svg xmlns="http://www.w3.org/2000/svg" width="960" height="680" viewBox="0 0 960 680" font-family="-apple-system,BlinkMacSystemFont,'Pretendard','Segoe UI',sans-serif">
  <title>Little Bard 로컬 평가 브리지와 Bookkiki 운영 경계</title>
  <desc>Little Bard가 로컬 공급자 어댑터를 통해 베이스 Qwen과 LoRA 버전을 순차 평가하고, 결과 출처를 저장한 뒤 블라인드 심판으로 비교하는 흐름. 실제 Bookkiki 운영은 별도의 비동기 작업 API와 모델 서버를 사용한다.</desc>
  <defs>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#6d28d9"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#8791a6"/>
    </marker>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#312e81" flood-opacity=".08"/>
    </filter>
  </defs>
  <style>
    .bg{fill:#fbfaff;stroke:#e7e3f4;stroke-width:1.5}
    .panel{fill:#fff;stroke:#ded9ec;stroke-width:1.4}
    .box{fill:#f7f5ff;stroke:#c7bde9;stroke-width:1.35;filter:url(#shadow)}
    .neutral{fill:#fff;stroke:#d7d4e3;stroke-width:1.25}
    .good{fill:#f0fdf4;stroke:#86c99a;stroke-width:1.35}
    .warn{fill:#fff8f2;stroke:#e6ad81;stroke-width:1.35}
    .title{font-size:19px;font-weight:800;fill:#29213e}
    .subtitle{font-size:11px;fill:#706a83}
    .panelTitle{font-size:13px;font-weight:800;fill:#6d28d9}
    .head{font-size:12px;font-weight:800;fill:#342d4d}
    .text{font-size:10.5px;fill:#5d5771}
    .small{font-size:9.5px;fill:#777086}
    .ok{font-size:10px;font-weight:750;fill:#15803d}
    .caution{font-size:10px;font-weight:750;fill:#b45309}
    .flow{stroke:#6d28d9;stroke-width:2;fill:none;marker-end:url(#arrowPurple)}
    .side{stroke:#8791a6;stroke-width:1.6;fill:none;marker-end:url(#arrowGray);stroke-dasharray:5 4}
  </style>

  <rect x="1" y="1" width="958" height="678" rx="18" class="bg"/>
  <text x="30" y="37" class="title">Little Bard 로컬 평가 브리지 — base와 LoRA를 섞지 않고 비교한다</text>
  <text x="30" y="57" class="subtitle">현재 Gradio는 개발 스모크용이다. 평가 계약은 OpenAI 호환 경계로 모으고, Bookkiki 운영 경로와 분리한다.</text>

  <rect x="20" y="76" width="920" height="226" rx="14" class="panel"/>
  <text x="38" y="101" class="panelTitle">A. 로컬 생성 경로 — 기존 Ollama 공급자 계약을 MLX Qwen에도 재사용</text>

  <rect x="38" y="124" width="142" height="78" rx="10" class="neutral"/>
  <text x="109" y="148" text-anchor="middle" class="head">Little Bard HTML</text>
  <text x="109" y="166" text-anchor="middle" class="text">HTTP 개발 서버로 실행</text>
  <text x="109" y="183" text-anchor="middle" class="text">Local provider 선택</text>

  <rect x="208" y="116" width="176" height="94" rx="10" class="box"/>
  <text x="296" y="140" text-anchor="middle" class="head">Local Provider Adapter</text>
  <text x="296" y="158" text-anchor="middle" class="text">요청 형식·오류·메타 통일</text>
  <text x="296" y="175" text-anchor="middle" class="text">요청 model = 적재 model 확인</text>
  <text x="296" y="193" text-anchor="middle" class="caution">불일치하면 생성 전 차단</text>

  <rect x="412" y="108" width="208" height="110" rx="10" class="warn"/>
  <text x="516" y="132" text-anchor="middle" class="head">개발 → 목표 엔드포인트</text>
  <text x="516" y="151" text-anchor="middle" class="text">현재: Gradio /generate_story</text>
  <text x="516" y="169" text-anchor="middle" class="text">목표: /v1/chat/completions</text>
  <text x="516" y="187" text-anchor="middle" class="text">127.0.0.1 바인딩 · origin 제한</text>
  <text x="516" y="205" text-anchor="middle" class="caution">Gradio는 운영 보안 경계가 아님</text>

  <rect x="648" y="108" width="274" height="110" rx="10" class="good"/>
  <text x="785" y="132" text-anchor="middle" class="head">확인된 모델 1개만 적재</text>
  <text x="785" y="151" text-anchor="middle" class="text">local-qwen-base</text>
  <text x="785" y="169" text-anchor="middle" class="text">local-qwen-childlit-lora-v1</text>
  <text x="785" y="187" text-anchor="middle" class="text">base revision · adapter checksum 고정</text>
  <text x="785" y="205" text-anchor="middle" class="ok">선택값과 서버 manifest 일치</text>

  <path class="flow" d="M180 163 L204 163"/>
  <path class="flow" d="M384 163 L408 163"/>
  <path class="flow" d="M620 163 L644 163"/>

  <rect x="38" y="242" width="884" height="40" rx="9" class="neutral"/>
  <text x="55" y="259" class="head">호출마다 저장</text>
  <text x="146" y="259" class="text">run_id · provider · requested/resolved model · model/tokenizer revision · adapter version/checksum · quant/runtime</text>
  <text x="146" y="276" class="text">prompt policy/hash · temperature/max_tokens · token/word count · latency/peak memory · finish reason · valid/error</text>

  <rect x="20" y="322" width="920" height="184" rx="14" class="panel"/>
  <text x="38" y="347" class="panelTitle">B. 학습 전후 평가 — 같은 입력을 순차 생성하고 심판에게 모델 이름을 숨긴다</text>

  <rect x="38" y="372" width="150" height="82" rx="10" class="neutral"/>
  <text x="113" y="396" text-anchor="middle" class="head">Holdout prompt</text>
  <text x="113" y="414" text-anchor="middle" class="text">같은 childlit-v3</text>
  <text x="113" y="431" text-anchor="middle" class="text">같은 decoding 설정</text>

  <rect x="218" y="366" width="178" height="94" rx="10" class="box"/>
  <text x="307" y="390" text-anchor="middle" class="head">① base run 저장</text>
  <text x="307" y="408" text-anchor="middle" class="text">서버 manifest 확인</text>
  <text x="307" y="425" text-anchor="middle" class="text">동화·메타·invalid 저장</text>
  <text x="307" y="443" text-anchor="middle" class="small">종료 후 adapter 서버로 전환</text>

  <rect x="426" y="366" width="178" height="94" rx="10" class="box"/>
  <text x="515" y="390" text-anchor="middle" class="head">② LoRA run 저장</text>
  <text x="515" y="408" text-anchor="middle" class="text">동일 holdout 재생성</text>
  <text x="515" y="425" text-anchor="middle" class="text">학습 데이터 누수 차단</text>
  <text x="515" y="443" text-anchor="middle" class="small">과거 체크포인트와 혼합 금지</text>

  <rect x="634" y="366" width="288" height="94" rx="10" class="good"/>
  <text x="778" y="390" text-anchor="middle" class="head">③ 기존 심판 파이프라인</text>
  <text x="778" y="408" text-anchor="middle" class="text">익명 A/B · 양방향 swap · 다계열 jury</text>
  <text x="778" y="425" text-anchor="middle" class="text">기술 실패는 tie가 아니라 invalid</text>
  <text x="778" y="443" text-anchor="middle" class="ok">품질·실패율·지연을 함께 보고 채택</text>

  <path class="flow" d="M188 413 L214 413"/>
  <path class="flow" d="M396 413 L422 413"/>
  <path class="flow" d="M604 413 L630 413"/>
  <text x="38" y="486" class="small">로컬 생성만 오프라인으로 가능하다. 외부 LLM 심판을 쓰면 심판 호출에는 별도 네트워크와 API 키가 필요하다.</text>

  <rect x="20" y="526" width="920" height="116" rx="14" class="panel"/>
  <text x="38" y="551" class="panelTitle">C. 실제 Bookkiki 운영 — 평가용 Gradio와 제품 엔드포인트를 분리한다</text>

  <rect x="38" y="571" width="140" height="48" rx="9" class="neutral"/>
  <text x="108" y="591" text-anchor="middle" class="head">Bookkiki 앱</text>
  <text x="108" y="607" text-anchor="middle" class="text">동화 작업 요청</text>

  <rect x="207" y="563" width="166" height="64" rx="9" class="box"/>
  <text x="290" y="585" text-anchor="middle" class="head">비동기 Job API</text>
  <text x="290" y="602" text-anchor="middle" class="text">202 + job_id · 멱등</text>
  <text x="290" y="618" text-anchor="middle" class="text">상태·결과는 DB 저장</text>

  <rect x="402" y="563" width="144" height="64" rx="9" class="box"/>
  <text x="474" y="585" text-anchor="middle" class="head">Queue · Worker</text>
  <text x="474" y="602" text-anchor="middle" class="text">재시도 · timeout</text>
  <text x="474" y="618" text-anchor="middle" class="text">provider adapter</text>

  <rect x="575" y="563" width="168" height="64" rx="9" class="good"/>
  <text x="659" y="585" text-anchor="middle" class="head">vLLM / AWS</text>
  <text x="659" y="602" text-anchor="middle" class="text">OpenAI 호환 API</text>
  <text x="659" y="618" text-anchor="middle" class="text">인증 · health · metrics</text>

  <rect x="772" y="563" width="150" height="64" rx="9" class="neutral"/>
  <text x="847" y="585" text-anchor="middle" class="head">결과 저장·알림</text>
  <text x="847" y="602" text-anchor="middle" class="text">모델·정책 버전</text>
  <text x="847" y="618" text-anchor="middle" class="text">성공·실패 provenance</text>

  <path class="side" d="M178 595 L203 595"/>
  <path class="side" d="M373 595 L398 595"/>
  <path class="side" d="M546 595 L571 595"/>
  <path class="side" d="M743 595 L768 595"/>

  <text x="30" y="663" class="subtitle">핵심: 평가 HTML의 Local provider는 후보를 공정하게 재는 장치이고, Bookkiki의 비동기 API는 실제 사용자 요청을 안전하게 처리하는 별도 경계다.</text>
</svg>
