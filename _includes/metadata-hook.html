<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap">

<!-- Custom CSS -->
<link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">

<!-- Reading Progress Bar -->
<style>
  #reading-progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 0%;
    height: 3px;
    background: linear-gradient(90deg, #7c3aed, #a78bfa, #c4b5fd);
    z-index: 9999;
    transition: width 0.1s ease;
  }
</style>
<div id="reading-progress-bar"></div>
<script>
  (function () {
    var bar = document.getElementById('reading-progress-bar');
    if (!bar) return;
    function update() {
      var scrollTop = window.scrollY || document.documentElement.scrollTop;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      var pct = docHeight > 0 ? Math.min(100, (scrollTop / docHeight) * 100) : 0;
      bar.style.width = pct + '%';
    }
    window.addEventListener('scroll', update, { passive: true });
  })();
</script>

<!-- Accessible term tooltips: hover/focus, Escape close, real DOM text. -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var terms = document.querySelectorAll('.term[data-tip]');
    terms.forEach(function (term, index) {
      if (term.dataset.tooltipBound === 'true') return;
      term.dataset.tooltipBound = 'true';
      if (!term.hasAttribute('tabindex')) term.setAttribute('tabindex', '0');

      var tooltip = document.createElement('span');
      tooltip.id = 'term-tooltip-' + index;
      tooltip.className = 'term-tooltip';
      tooltip.setAttribute('role', 'tooltip');
      tooltip.textContent = term.dataset.tip;
      tooltip.hidden = true;
      document.body.appendChild(tooltip);
      term.setAttribute('aria-describedby', tooltip.id);

      function place() {
        if (tooltip.hidden) return;
        var trigger = term.getBoundingClientRect();
        var box = tooltip.getBoundingClientRect();
        var margin = 10;
        var left = trigger.left + trigger.width / 2 - box.width / 2;
        left = Math.max(margin, Math.min(left, window.innerWidth - box.width - margin));
        var top = trigger.top - box.height - margin;
        if (top < margin) top = trigger.bottom + margin;
        tooltip.style.left = Math.round(left) + 'px';
        tooltip.style.top = Math.round(top) + 'px';
      }

      function show() {
        tooltip.hidden = false;
        tooltip.dataset.open = 'true';
        place();
      }

      function hide() {
        tooltip.dataset.open = 'false';
        tooltip.hidden = true;
      }

      term.addEventListener('mouseenter', show);
      term.addEventListener('mouseleave', hide);
      term.addEventListener('focus', show);
      term.addEventListener('blur', hide);
      term.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') {
          hide();
          term.blur();
        }
      });
      window.addEventListener('resize', place, { passive: true });
      window.addEventListener('scroll', place, { passive: true });
    });
  });
</script>
